<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Events</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="./js/authCheck.js"></script>

</head>

<body class="bg-black text-gray-200">

<div class="flex min-h-screen">

<div id="adminSidebar"></div>

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Events Management</h1>

<p class="text-gray-400 mb-8">Add, edit, or remove events.</p>

<div class="bg-gray-900 p-6 rounded-lg mb-10">

<h2 class="text-xl font-semibold mb-4">Add Event</h2>

<form id="eventForm" class="space-y-4">

<input type="text" id="title" placeholder="Event Title" class="w-full p-3 bg-gray-800" required>

<textarea id="description" placeholder="Description" class="w-full p-3 bg-gray-800"></textarea>

<input type="text" id="date" placeholder="Date (YYYY-MM-DD)" class="w-full p-3 bg-gray-800">

<input type="text" id="time" placeholder="Time (e.g. 2PM - 6PM)" class="w-full p-3 bg-gray-800">

<input type="text" id="location" placeholder="Location" class="w-full p-3 bg-gray-800">


<div class="space-y-2">
  <label class="text-sm text-gray-400">Event Image</label>

  <div id="dropZone"
       class="w-full p-6 border-2 border-dashed border-gray-600 rounded-lg text-center cursor-pointer hover:border-blue-500 transition">

    <p class="text-gray-400">
      Drag & drop image here or
      <span class="text-blue-400 underline">click to choose</span>
    </p>

    <input type="file" id="image" accept="image/*" class="hidden">

    <img id="previewImage"
         class="hidden mt-4 mx-auto rounded-lg max-h-40 object-cover" />
  </div>
</div>

<input type="text" id="tags" placeholder="Tags (comma separated)" class="w-full p-3 bg-gray-800">

<input type="text" id="attendees" placeholder="Attendees (optional)" class="w-full p-3 bg-gray-800">

<button id="submitBtn" type="submit" class="bg-blue-600 px-5 py-2 rounded text-white">
  Add Event
</button>

</form>

</div>

<div>
<h2 class="text-xl font-semibold mb-4">All Events</h2>
<div id="eventsList" class="space-y-4"></div>
</div>

</div>

</div>

<script src="./components/sidebar.js"></script>
<script type="module" src="./js/eventsAdmin.js"></script>

</body>
</html>
