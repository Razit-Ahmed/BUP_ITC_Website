<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | BUP ITC</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center min-h-screen text-gray-200">

<div class="bg-gray-900 border border-gray-800 rounded-xl p-8 w-96">

<h1 class="text-2xl font-bold mb-6 text-center">Admin Login</h1>

<form id="loginForm" class="space-y-4">

<input
type="text"
name="username"
placeholder="Username"
required
class="w-full bg-gray-800 border border-gray-700 px-4 py-3 rounded"
/>

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full bg-gray-800 border border-gray-700 px-4 py-3 rounded"
/>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-semibold">
Login
</button>

</form>

<p id="message" class="text-center mt-4 text-sm"></p>

</div>

<script src="./js/login.js"></script>

</body>
</html>
