<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Executives</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="./js/authCheck.js"></script>

</head>

<body class="bg-black text-gray-200">

<div class="flex min-h-screen">

<div id="adminSidebar"></div>


<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Executives Management</h1>

<p class="text-gray-400 mb-8">Add, edit, or remove executive members.</p>


<div class="bg-gray-900 p-6 rounded-lg mb-10">

<h2 class="text-xl font-semibold mb-4">Add Executive</h2>

<form id="executiveForm" class="space-y-4" enctype="multipart/form-data">

<input type="text" id="name" placeholder="Name"
class="w-full p-3 bg-gray-800" required>

<input type="text" id="position" placeholder="Position"
class="w-full p-3 bg-gray-800">

<input type="text" id="department" placeholder="Department"
class="w-full p-3 bg-gray-800">

<input type="text" id="linkedin" placeholder="LinkedIn URL"
class="w-full p-3 bg-gray-800">


<div class="w-full p-4 bg-gray-800 border-2 border-dashed border-gray-600 text-center cursor-pointer"
     id="dropArea">
  <p class="text-gray-400">Drag & Drop Image OR Click to Upload</p>
  <input type="file" id="imageFile" class="hidden" accept="image/*">
</div>

<button id="submitBtn"
class="bg-blue-600 px-5 py-2 rounded text-white">
Add Executive
</button>

</form>

</div>


<div>
<h2 class="text-xl font-semibold mb-4">All Executives</h2>
<div id="executivesList" class="space-y-4"></div>
</div>

</div>

</div>

<script src="./components/sidebar.js"></script>
<script type="module" src="./js/executivesAdmin.js"></script>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("imageFile");


dropArea.addEventListener("click", () => fileInput.click());


dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.classList.add("border-blue-500");
});

dropArea.addEventListener("dragleave", () => {
  dropArea.classList.remove("border-blue-500");
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.classList.remove("border-blue-500");
  fileInput.files = e.dataTransfer.files;
});
</script>

</body>
</html>
