<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Alumni</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="./js/authCheck.js"></script>
</head>

<body class="bg-black text-gray-200">

<div class="flex min-h-screen">

<div id="adminSidebar"></div>

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Alumni Management</h1>

<p class="text-gray-400 mb-8">Add, edit, or remove alumni members.</p>


<div class="bg-gray-900 p-6 rounded-lg mb-10">

<h2 class="text-xl font-semibold mb-4">Add Alumni</h2>

<form id="alumniForm" class="space-y-4">

<input id="name" type="text" placeholder="Name" class="w-full p-3 bg-gray-800" required>
<input id="position" type="text" placeholder="Position" class="w-full p-3 bg-gray-800">
<input id="batch" type="text" placeholder="Batch" class="w-full p-3 bg-gray-800">
<input id="linkedin" type="text" placeholder="LinkedIn URL" class="w-full p-3 bg-gray-800">

<input id="imageFile" type="file" class="w-full p-3 bg-gray-800">

<button id="submitBtn" type="submit" class="bg-blue-600 px-5 py-2 rounded">
Add Alumni
</button>

</form>

</div>


<div>
<h2 class="text-xl font-semibold mb-4">All Alumni</h2>
<div id="alumniList" class="space-y-4"></div>
</div>

</div>
</div>

<script src="./components/sidebar.js"></script>
<script type="module" src="./js/alumniAdmin.js"></script>

</body>
</html>
